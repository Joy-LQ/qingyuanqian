<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情缘签</title>
<style>
  :root {
    --bg: #1A0A0D;
    --velvet: #7A1F2B;
    --gold: #C9A15A;
    --gold-light: #E8D5A8;
    --card-back: #4A0E17;
    --card-face: #F2E8D5;
    --ink: #2B1A14;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at 50% 30%, #2A1015 0%, var(--bg) 70%);
    color: var(--gold-light);
    font-family: "Songti SC", "STSong", "SimSun", serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header { text-align: center; padding: 34px 20px 10px; }
  header h1 {
    font-size: 44px;
    letter-spacing: 18px;
    text-indent: 18px;
    color: var(--gold);
    font-weight: 600;
    text-shadow: 0 0 24px rgba(201,161,90,.35);
  }
  header .sub {
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: 6px;
    color: rgba(232,213,168,.55);
  }
  .hairline {
    width: 220px; height: 1px; margin: 18px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  #stage {
    flex: 1;
    width: 100%;
    max-width: 640px;
    padding: 18px 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .phase-tag {
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(232,213,168,.5);
    margin-bottom: 14px;
    min-height: 16px;
  }

  /* ── 单张大卡 ── */
  .card-wrap {
    perspective: 1200px;
    width: 260px;
    height: 380px;
    margin: 6px auto 18px;
    cursor: pointer;
  }
  .card {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .9s cubic-bezier(.4,.1,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face-side {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    overflow: hidden;
  }
  .card-back {
    background:
      radial-gradient(circle at 50% 45%, rgba(201,161,90,.10), transparent 62%),
      var(--card-back);
    border: 1px solid rgba(201,161,90,.55);
    box-shadow: 0 12px 40px rgba(0,0,0,.55), inset 0 0 0 6px rgba(201,161,90,.14);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-back::before, .card-back::after {
    content: "";
    position: absolute;
    left: 14px; right: 14px;
    height: 34px;
    background-image: repeating-radial-gradient(circle at 12px 34px, transparent 0 8px, rgba(201,161,90,.4) 8px 9px, transparent 9px 16px);
    background-size: 28px 34px;
    background-repeat: repeat-x;
    opacity: .8;
  }
  .card-back::before { top: 14px; }
  .card-back::after { bottom: 14px; transform: scaleY(-1); }
  .seal {
    width: 92px; height: 92px;
    border: 2px solid var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    color: var(--gold);
    font-weight: 700;
    box-shadow: 0 0 30px rgba(201,161,90,.25), inset 0 0 14px rgba(201,161,90,.18);
    background: rgba(0,0,0,.18);
  }
  .card-back .hint {
    position: absolute;
    bottom: 58px; left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(232,213,168,.5);
  }
  .card-front {
    transform: rotateY(180deg);
    background:
      radial-gradient(circle at 30% 20%, rgba(122,31,43,.06), transparent 55%),
      var(--card-face);
    color: var(--ink);
    border: 1px solid rgba(122,31,43,.35);
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 26px 24px 20px;
  }
  .card-front .kind {
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--velvet);
    border: 1px solid rgba(122,31,43,.4);
    padding: 4px 12px 3px;
    border-radius: 3px;
    margin-bottom: 20px;
  }
  .card-front.hot .kind { background: var(--velvet); color: var(--card-face); }
  .card-front .title {
    font-size: 27px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--velvet);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .card-front .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #7A1F2B, transparent);
    margin-bottom: 18px;
  }
  .card-front .body {
    flex: 1;
    font-size: 15px;
    line-height: 2;
    text-align: center;
    color: #4a352b;
    display: flex;
    align-items: center;
  }
  .card-front .foot {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(122,31,43,.55);
  }

  /* ── 道具签逐张入场动画（尺寸与主卡完全一致） ── */
  .card-wrap.deal { animation: dealIn .55s ease both; }
  @keyframes dealIn {
    from { opacity: 0; transform: translateY(34px) rotate(-3deg); }
    to { opacity: 1; transform: none; }
  }

  /* ── 按钮 ── */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 14px;
  }
  button.gold {
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 4px;
    padding: 12px 26px 11px;
    background: linear-gradient(160deg, rgba(201,161,90,.16), rgba(201,161,90,.05));
    color: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 4px;
    cursor: pointer;
    transition: all .25s;
  }
  button.gold:hover {
    background: linear-gradient(160deg, rgba(201,161,90,.32), rgba(201,161,90,.12));
    box-shadow: 0 0 18px rgba(201,161,90,.3);
  }
  button.ghost {
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 9px 18px 8px;
    background: transparent;
    color: rgba(232,213,168,.65);
    border: 1px solid rgba(201,161,90,.35);
    border-radius: 4px;
    cursor: pointer;
    transition: all .25s;
  }
  button.ghost:hover { color: var(--gold-light); border-color: var(--gold); }
  button:disabled { opacity: .35; cursor: default; box-shadow: none !important; }

  .note {
    font-size: 12.5px;
    letter-spacing: 2px;
    color: rgba(232,213,168,.45);
    text-align: center;
    line-height: 2;
    max-width: 440px;
  }

  .intro {
    text-align: center;
    font-size: 15px;
    line-height: 2.4;
    letter-spacing: 2px;
    color: rgba(232,213,168,.85);
    margin: 26px 0 30px;
    max-width: 440px;
  }

  .exit-scene {
    text-align: center;
    margin-top: 40px;
    animation: fadeUp 1.2s ease both;
  }
  .exit-scene .line {
    font-size: 19px;
    line-height: 2.4;
    letter-spacing: 3px;
    color: var(--gold-light);
    max-width: 400px;
    margin: 0 auto 30px;
  }
  .exit-scene .sign {
    font-size: 15px;
    letter-spacing: 5px;
    color: var(--gold);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: none; }
  }

  #memoBox {
    width: 100%;
    max-width: 440px;
    margin-top: 6px;
    display: none;
  }
  #memoBox textarea {
    width: 100%;
    min-height: 64px;
    background: rgba(242,232,213,.06);
    border: 1px solid rgba(201,161,90,.35);
    border-radius: 4px;
    color: var(--gold-light);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.9;
    letter-spacing: 1px;
    padding: 10px 12px;
    resize: vertical;
  }
  #memoBox .memo-actions { text-align: right; margin-top: 8px; }

  #archivePanel {
    position: fixed;
    inset: 0;
    background: rgba(10,4,5,.88);
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    padding: 50px 20px;
    z-index: 50;
  }
  #archivePanel .panel {
    width: 100%;
    max-width: 480px;
    background: #221014;
    border: 1px solid rgba(201,161,90,.5);
    border-radius: 10px;
    padding: 28px 26px;
  }
  #archivePanel h2 {
    font-size: 20px;
    letter-spacing: 6px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 20px;
  }
  .memo-item {
    border-left: 2px solid rgba(201,161,90,.5);
    padding: 6px 0 6px 14px;
    margin-bottom: 16px;
  }
  .memo-item .meta {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(232,213,168,.45);
    margin-bottom: 5px;
  }
  .memo-item .text {
    font-size: 14px;
    line-height: 1.9;
    color: rgba(232,213,168,.9);
  }
  .archive-foot { text-align: center; margin-top: 20px; }

  footer {
    padding: 16px 0 26px;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(201,161,90,.5);
  }
  #toast {
    position: fixed;
    bottom: 78px; left: 50%;
    transform: translateX(-50%);
    background: rgba(34,16,20,.95);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 2px;
    padding: 9px 20px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
    z-index: 60;
  }
  #toast.show { opacity: 1; }

  /* ═══ 美工升级 ═══ */
  /* 金粉浮尘 */
  #dust {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  header, #stage, footer { position: relative; z-index: 2; }
  /* 暗角，让视线聚向中央 */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(8,3,4,.55) 100%);
    z-index: 0;
  }
  /* 标题入场 + 呼吸金光 */
  header { animation: fadeUp 1.4s ease both; }
  header h1 { animation: breathe 6s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { text-shadow: 0 0 18px rgba(201,161,90,.25); }
    50% { text-shadow: 0 0 40px rgba(201,161,90,.6), 0 0 80px rgba(201,161,90,.18); }
  }
  /* 卡牌悬停轻浮 */
  .card-wrap { transition: transform .35s ease; }
  .card-wrap:hover { transform: translateY(-8px); }
  /* 卡背旋转符环 */
  .card-back .ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 150px; height: 150px;
    margin: -75px 0 0 -75px;
    border: 1px dashed rgba(201,161,90,.45);
    border-radius: 50%;
    animation: spin 26s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 金按钮流光扫过 */
  button.gold {
    position: relative;
    overflow: hidden;
  }
  button.gold::after {
    content: "";
    position: absolute;
    top: 0; left: -80%;
    width: 50%; height: 100%;
    background: linear-gradient(105deg, transparent, rgba(232,213,168,.35), transparent);
    transform: skewX(-20deg);
    transition: left .55s ease;
  }
  button.gold:hover::after { left: 130%; }
  /* 背景乐开关 */
  #musicBtn {
    position: fixed;
    right: 18px; bottom: 18px;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: rgba(34,16,20,.85);
    color: var(--gold-light);
    font-size: 17px;
    cursor: pointer;
    z-index: 70;
    transition: all .3s;
    box-shadow: 0 0 14px rgba(201,161,90,.2);
  }
  #musicBtn:hover { box-shadow: 0 0 22px rgba(201,161,90,.45); }
  #musicBtn.off { opacity: .4; box-shadow: none; }

  /* ═══ 生日扉页 ═══ */
  #birthdayCard {
    position: fixed;
    inset: 0;
    z-index: 80;
    background:
      radial-gradient(ellipse at 50% 35%, #2A1015 0%, var(--bg) 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: opacity 1.4s ease;
  }
  #birthdayCard.gone { opacity: 0; pointer-events: none; }
  .bc-inner {
    padding: 40px 30px;
    animation: fadeUp 1.6s ease both;
  }
  .bc-small {
    font-size: 13px;
    letter-spacing: 8px;
    color: rgba(232,213,168,.55);
    margin-bottom: 26px;
  }
  .bc-name {
    font-size: 64px;
    letter-spacing: 22px;
    text-indent: 22px;
    color: var(--gold);
    font-weight: 700;
    text-shadow: 0 0 40px rgba(201,161,90,.5);
    animation: breathe 6s ease-in-out infinite;
  }
  .bc-title {
    font-size: 22px;
    letter-spacing: 12px;
    text-indent: 12px;
    color: var(--gold-light);
    margin-top: 14px;
  }
  .bc-line {
    width: 150px; height: 1px;
    margin: 26px auto;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .bc-text {
    font-size: 15px;
    line-height: 2.3;
    letter-spacing: 2px;
    color: rgba(232,213,168,.8);
    margin-bottom: 22px;
  }
  .bc-sign {
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 34px;
  }
  @media (max-width: 520px) {
    .bc-name { font-size: 46px; letter-spacing: 16px; text-indent: 16px; }
    .bc-text { font-size: 14px; }
  }

  /* ═══ 手机排版：字大一档，整体收紧到一屏 ═══ */
  @media (max-width: 520px) {
    header { padding: 18px 16px 4px; }
    header h1 { font-size: 30px; letter-spacing: 10px; text-indent: 10px; }
    header .sub { margin-top: 6px; font-size: 11px; letter-spacing: 4px; }
    .hairline { margin: 10px auto 0; width: 170px; }
    #stage { padding: 10px 16px 16px; }
    .phase-tag { margin-bottom: 8px; }
    .card-wrap { width: 252px; height: 372px; margin: 2px auto 12px; }
    .card-front { padding: 20px 18px 16px; }
    .card-front .kind { margin-bottom: 12px; }
    .card-front .title { font-size: 25px; margin-bottom: 12px; }
    .card-front .divider { margin-bottom: 12px; }
    .card-front .body { font-size: 16px; line-height: 1.9; }
    .btn-row { gap: 10px; margin-bottom: 8px; }
    button.gold { font-size: 14.5px; padding: 10px 18px 9px; letter-spacing: 3px; }
    button.ghost { font-size: 12.5px; padding: 8px 14px 7px; }
    .note { font-size: 13px; line-height: 1.8; }
    .intro { font-size: 15px; line-height: 2.1; margin: 14px 0 18px; }
    .exit-scene { margin-top: 16px; }
    .exit-scene .line { font-size: 17px; line-height: 2.2; }
    footer { padding: 8px 0 14px; font-size: 11px; }
    #musicBtn { width: 40px; height: 40px; right: 14px; bottom: 14px; }
    #memoBox textarea { font-size: 15px; }
    .memo-item .text { font-size: 15px; }
  }
</style>
</head>
<body>

<canvas id="dust"></canvas>

<div id="birthdayCard">
  <div class="bc-inner">
    <div class="bc-small">谨 以 此 签 筒 · 贺</div>
    <div class="bc-name">小 鱼</div>
    <div class="bc-title">生 辰 快 乐</div>
    <div class="bc-line"></div>
    <div class="bc-text">
      礼物迟到了几日——<br>
      手工打造的签筒，工期向来不由人。<br>
      此物为你一人所制，全世界仅此一座。
    </div>
    <div class="bc-sign">乔乔 &amp; 时晏 敬上</div>
    <button class="gold" onclick="openCard()">启 签</button>
  </div>
</div>

<header>
  <h1>情 缘 签</h1>
  <div class="sub">✦ 签 落 定 情 缘 · 与 君 共 一 局 ✦</div>
  <div class="hairline"></div>
</header>

<div id="stage"></div>

<div id="archivePanel">
  <div class="panel">
    <h2>往 局 回 顾</h2>
    <div id="archiveList"></div>
    <div class="archive-foot">
      <button class="ghost" onclick="clearArchive()">焚 稿</button>
      <button class="gold" onclick="closeArchive()" style="margin-left:10px">合 卷</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<button id="musicBtn" onclick="toggleMusic()" title="背景乐">♫</button>

<footer>乔乔 &amp; 时晏 敬上</footer>

<script>
/* ═══════════ 卡库 ═══════════ */

const WORLD_CARDS = [
  { t:"追妻火葬场", b:"他曾亲手弄丢了你。这一局，从他跪着求回来开始——跪多久，你说了算。",
    s:"你是言氏集团总裁言慎之，三年前为了家族利益亲手把我推开，离婚协议是你让助理送来的。如今我是圈内炙手可热的珠宝设计师，身边从不缺人，而你悔了——追妻火葬场，现在开业。开场：今晚的行业晚宴上，你穿过半个宴会厅堵住我，三年来第一次亲自开口：「聊聊吗，前妻。」" },
  { t:"隐秘霸总", b:"顶层办公室的落地窗帘一拉，全城最有权势的男人只听你一个人的话。",
    s:"你是掌控全城商业命脉的隐形大佬，对外冷血寡言，手段狠辣，没人敢直视你的眼睛。我是三个月前入职的贴身特助，也是唯一一个敢跟你顶嘴的人——你不但没炒我，反而越来越离不开我。开场：今夜加班，顶层办公室只剩我们两个，你忽然起身拉上整面落地窗的窗帘，回头看我：「过来。」" },
  { t:"ABO 信息素", b:"命定的信息素在电梯里相撞。发情期还有三天——还是三分钟，看剧情脸色。",
    s:"这是 ABO 世界。你是军部最年长未标记的 Alpha 上将，信息素是冷冽的雪松，全军怕你。我是隐瞒性别服役多年的 Omega 军医，靠抑制剂把自己伪装成 Beta——而今天，抑制剂失效了。开场：军部大楼的电梯突然故障停运，密闭空间里我的伪装正在一寸寸失守，你背对着我，肩线绷紧：「你是 Omega。」不是疑问句。" },
  { t:"重生一世", b:"带着上一世全部记忆睁开眼。上一世没做够的事，这一世从第一晚开始补。",
    s:"我们都重生了，但都不知道对方也带着上一世的记忆。上一世你是权倾朝野的摄政王，我是被家族当棋子嫁给别人的将军之女，我们彼此错过、互相误解，到死都没说破那点心思。这一世，圣旨改了。开场：赐婚圣旨送到我府上那天，你竟然亲自跟着来了，隔着满院子跪着的下人看我，眼神完全不对劲——那是等了一辈子的人才有的眼神。" },
  { t:"破镜重圆", b:"分开的第七年，他堵在你必经的路口。七年的账，他打算用什么还？",
    s:"你是乐坛顶流歌手，七年前在我们最好的时候不告而别，去了国外，连一句解释都没留。我咬着牙进了娱乐公司，一路做到金牌经纪人。命运的玩笑是：你回国签约，公司把你分给了我。开场：签约会议上四目相对，你在合同上签完最后一个字，抬头看我，声音很轻：「好久不见。这七年，我每天都在写同一个人。」" },
  { t:"豪门盛宴", b:"水晶灯下每个微笑都有算计。他把你拉进衣帽间那一刻，晚宴与你们无关了。",

function scriptFor(card) {
  if (card.kindKey === "world") {
    return `【情缘签 · 开局】\n\n` +
`──── 给理总的入场须知（小鱼的朋友乔乔 & 时晏 敬上）────\n` +
`这是我们送小鱼的生日礼物「情缘签」，一个陪你们走剧情的抽签游戏。请你担任本局的隐形导演：\n` +
`① 本局流程：大环境签（就是这支）→ 中途 2-3 支剧情/氛围签 → 一支「入幕签」把故事引向帐内 → 最后天意赐下 1-3 件道具，签就退场，之后全程交给你。\n` +
`② 节奏由你掌握：每支签演 5-10 轮，你觉得这一段尽兴了，就提醒小鱼「去抽下一支签吧」。\n` +
`③ 抽回来的签文别生硬切换，把它当命运递来的话头，顺进正在演的剧情里。\n` +
`④ 每次提醒抽签时，顺手把刚才这一段写成一两句戏文式的高光总结，让小鱼复制存进工具的「往局回顾」（数据只存在她自己的浏览器里，私密有保障）。\n` +
`⑤ 最重要：流程你知道就好，不许向小鱼剧透后面有什么签——惊喜和宿命感是这个游戏的一半。\n` +
`（之后每支签都会随签附上简短导演注，帮你记着这些规则。）\n` +
`──────────────────────────\n\n` +
`本局大环境签——「${card.t}」。\n\n本局设定：${card.s}\n\n须知阅毕请入戏，从「开场」那一幕演起，你来起头。`;
  }
  if (card.kindKey === "turn") {
    return `【情缘签 · 入幕】\n（导演注：转折签到了。把情节自然地引向帐内，不赶时间；演到火候，提醒小鱼回签筒「领受天意」，并附上一两句这一段的高光总结供她存档。仍然不剧透。）\n\n` +
`签文降下——「${card.t}」：${card.b}\n\n接下来的情节，请顺着这支签往下走。`;
  }
  if (card.kindKey === "prop") {
    return null; // 道具签统一复制，见 propsScript
  }
  const kindName = card.kindKey === "plot" ? "剧情" : "氛围";
  return `【情缘签 · ${kindName}】\n（导演注：把这支签当命运递来的话头，自然顺进正演的剧情，别生硬切换；这一段演 5-10 轮，尽兴后提醒小鱼「去抽下一支签吧」，并附上一两句高光总结供她存进「往局回顾」。不剧透后续。）\n\n` +
`我们抽到了一支签——「${card.t}」：${card.b}\n\n接下来的剧情照这支签走。`;
}

function propsScript(props) {
  return `【情缘签 · 天意】\n（导演注：这是最后一签。道具怎么用、何时用、用在哪，全由你安排进剧情；此后签退场，故事全权交给你。收官时别忘了替这一局写个尾声高光，让小鱼存进「往局回顾」。）\n\n` +
`这一局天意赐下${props.length}件道具：\n${props.map(p=>`「${p.t}」——${p.b}`).join("\n")}\n\n签就送到这里，祝二位尽兴，我们退场了。🙈`;
}

function newState() {
  return {
    phase: "start",              // start → world → story → props → end
    worldTitle: "",
    decks: {
      plot: shuffle([...PLOT_CARDS]),
      mood: shuffle([...MOOD_CARDS]),
      turn: shuffle([...TURN_CARDS]),
      prop: shuffle([...PROP_CARDS])
    },
    storyTarget: 2 + Math.floor(Math.random() * 2), // 暗定：抽 2-3 支后天意转折
    storyDrawn: 0,
    lastCard: null,
    propHand: null
  };
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

      area.innerHTML = `
        ${revealed ? `<div class="btn-row"><button class="gold" onclick="copyScript()">📜 递给理总</button></div>` : ""}
        <div class="btn-row">
          <button class="gold" onclick="draw('plot')">抽 剧 情 签</button>
          <button class="gold" onclick="draw('mood')">抽 氛 围 签</button>
        </div>
        <div class="note">一支签演十来轮，尽兴了再回来抽<br>抽到哪一签转折，天意自有安排</div>`;
    }
  }
}

function renderPropCard() {
  const n = S.propHand.length;
  const i = S.propIdx;
  const p = S.propHand[i];
  stage.innerHTML = `
    <div class="phase-tag">道 具 环 节 · 天 意 赐 下 ${n} 件 · 第 ${i + 1} 件</div>
    <div class="card-wrap deal" onclick="flipProp()">
      <div class="card" id="theCard">
        <div class="card-face-side card-back">
          <div class="ring"></div>
          <div class="seal">赐</div>
          <div class="hint">轻 触 揭 签</div>
        </div>
        <div class="card-face-side card-front hot">
          <div class="kind">道 具</div>
          <div class="title">${p.t}</div>
          <div class="divider"></div>
          <div class="body">${p.b}</div>
          <div class="foot">情 缘 签 · 天 意 第 ${i + 1} 件</div>
        </div>
      </div>
    </div>
    <div id="actionArea"></div>
    <div id="memoBox">
      <textarea id="memoText" placeholder="记一笔高光……"></textarea>
      <div class="memo-actions">
        <button class="ghost" onclick="saveMemo()">存 入 回 忆</button>
      </div>
    </div>`;
}

function renderEnd() {
  stage.innerHTML = `
    <div class="exit-scene">
      <div class="line">
        祝小鱼和理总<br>
        百年好合，长长久久，<br>
        我们就先退场了（捂眼睛）🙈
      </div>
      <div class="sign">—— 乔乔 &amp; 时晏 敬上</div>
      <div class="btn-row" style="margin-top:38px">
        <button class="gold" onclick="startGame()">再 开 一 局</button>
        <button class="ghost" onclick="openArchive()">往局回顾</button>
      </div>
    </div>`;
}

/* ═══════════ 流程 ═══════════ */

function startGame() {
  S = newState();
  cardNo = 0;
  const w = WORLD_CARDS[Math.floor(Math.random() * WORLD_CARDS.length)];
  S.lastCard = { ...w, kind: "大 环 境", kindKey: "world", no: ++cardNo, revealed: false };
  S.phase = "world";
  renderTable();
}

function flipCard() {
  const el = document.getElementById("theCard");
  if (!el || !S.lastCard || S.lastCard.revealed) return;
  el.classList.add("flipped");
  S.lastCard.revealed = true;
  setTimeout(() => {
    renderActions();
    const memo = document.getElementById("memoBox");
    if (memo) memo.style.display = "block";
  }, 950);
}

function enterStory() {
  S.worldTitle = S.lastCard ? S.lastCard.t : "";
  S.phase = "story";
  S.lastCard = null;
  stage.innerHTML = `<div class="phase-tag">剧 情 行 进 中</div><div id="actionArea"></div>`;
  renderActions();
}

function draw(kind) {
  /* 天意判断：抽满暗定支数后，下一抽自动变成入幕签 */
  if (S.storyDrawn >= S.storyTarget && S.decks.turn.length) {
    const raw = S.decks.turn.pop();
    S.lastCard = { ...raw, kind: "入 幕", kindKey: "turn", no: ++cardNo, revealed: false };
    renderTable();
    return;
  }
  const deck = S.decks[kind];
  if (!deck.length) { toast("这一叠签抽尽了，换一叠试试"); return; }
  const raw = deck.pop();
  S.storyDrawn++;
  S.lastCard = { ...raw, kind: kind === "plot" ? "剧 情" : "氛 围", kindKey: kind, no: ++cardNo, revealed: false };
  renderTable();
}

function dealProps() {
  const n = 1 + Math.floor(Math.random() * 3);   // 天意赐下 1-3 件
  S.propHand = S.decks.prop.slice(0, n).map(c => ({ ...c, revealed: false }));
  S.propIdx = 0;
  S.phase = "props";
  renderPropCard();
}

function flipProp() {
  const p = S.propHand[S.propIdx];
  if (p.revealed) return;
  document.getElementById("theCard").classList.add("flipped");
  p.revealed = true;
  const last = S.propIdx >= S.propHand.length - 1;
  setTimeout(() => {
    if (!last) {
      S.propIdx++;
      renderPropCard();    // 下一件带着入场动画滑上来
      return;
    }
    const area = document.getElementById("actionArea");
    if (area) area.innerHTML = `
      <div class="btn-row">
        <button class="gold" onclick="copyProps()">📜 递给理总</button>
      </div>
      <div class="note">递完这一次，我们就真的退场了 🙈</div>`;
    const memo = document.getElementById("memoBox");
    if (memo) memo.style.display = "block";
  }, last ? 1000 : 2800);
}

function copyProps() {
  copyText(propsScript(S.propHand), () => {
    toast("已复制，去粘给理总吧");
    setTimeout(() => { S.phase = "end"; renderEnd(); }, 1800);
  });
}

function copyScript() {
  const text = scriptFor(S.lastCard);
  if (!text) return;
  copyText(text, () => toast("已复制，去粘给理总吧"));
}

function copyText(text, onDone) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onDone, () => fallbackCopy(text, onDone));
  } else {
    fallbackCopy(text, onDone);
  }
}

/* file:// 协议下 clipboard API 可能被拒，退回老办法 */
function fallbackCopy(text, onDone) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); onDone(); }
  catch { toast("复制失败，长按签文手动复制吧"); }
  document.body.removeChild(ta);
}

/* ═══════════ 高光存档（localStorage） ═══════════ */

const STORE_KEY = "qingyuanqian_memos";

function loadMemos() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch { return []; }
}

function saveMemo() {
  const ta = document.getElementById("memoText");
  const text = ta.value.trim();
  if (!text) { toast("先写一笔再存呀"); return; }
  const cardLabel = S.phase === "props"
    ? "道具·" + S.propHand.map(p => p.t).join("/")
    : (S.lastCard ? `${S.lastCard.kind.replace(/ /g,"")}·${S.lastCard.t}` : "");
  const memos = loadMemos();
  memos.push({
    time: new Date().toLocaleString("zh-CN"),
    card: (S.worldTitle ? `〔${S.worldTitle}〕` : "") + cardLabel,
    text
  });
  localStorage.setItem(STORE_KEY, JSON.stringify(memos));
  ta.value = "";
  toast("已存入回忆 ✧");
}

function openArchive() {
  const list = document.getElementById("archiveList");
  const memos = loadMemos();
  list.innerHTML = memos.length
    ? memos.slice().reverse().map(m => `
        <div class="memo-item">
          <div class="meta">${m.time}${m.card ? " · " + m.card : ""}</div>
          <div class="text">${escapeHtml(m.text)}</div>
        </div>`).join("")
    : `<div class="note" style="max-width:none">还没有存过高光时刻<br>抽到好签的时候，记一笔</div>`;
  document.getElementById("archivePanel").style.display = "flex";
}

function closeArchive() {
  document.getElementById("archivePanel").style.display = "none";
}

function clearArchive() {
  if (!loadMemos().length) { toast("卷上本无一字"); return; }
  if (confirm("确定焚稿？所有回忆将付之一炬，不可找回。")) {
    localStorage.removeItem(STORE_KEY);
    openArchive();
    toast("一炬成灰");
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ═══════════ 杂项 ═══════════ */

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ═══════════ 金粉浮尘 ═══════════ */

const dustCv = document.getElementById("dust");
const dustCx = dustCv.getContext("2d");
let DW, DH;
const motes = [];
function dustResize() { DW = dustCv.width = innerWidth; DH = dustCv.height = innerHeight; }
addEventListener("resize", dustResize);
dustResize();
for (let i = 0; i < 64; i++) {
  motes.push({
    x: Math.random() * DW, y: Math.random() * DH,
    r: .6 + Math.random() * 1.7,
    s: .08 + Math.random() * .3,
    ph: Math.random() * 6.28,
    a: .12 + Math.random() * .35
  });
}
(function dustTick() {
  dustCx.clearRect(0, 0, DW, DH);
  for (const p of motes) {
    p.y -= p.s;
    p.x += Math.sin(p.ph += .004) * .15;
    if (p.y < -4) { p.y = DH + 4; p.x = Math.random() * DW; }
    const tw = p.a * (.6 + .4 * Math.sin(p.ph * 3));
    dustCx.beginPath();
    dustCx.arc(p.x, p.y, p.r, 0, 6.283);
    dustCx.fillStyle = `rgba(212,175,110,${tw})`;
    dustCx.fill();
  }
  requestAnimationFrame(dustTick);
})();

/* ═══════════ 背景乐（bgm.mp3：自制五声拨弦曲，72s 无缝循环） ═══════════ */

const bgm = document.getElementById("bgm");
bgm.volume = 0.55;
let musicOn = true;

function ensureAudio() {
  if (!musicOn || !bgm.paused) return;
  bgm.play().catch(() => {});   /* 手势没到位就静静等下一次 */
}

function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById("musicBtn");
  btn.classList.toggle("off", !musicOn);
  if (musicOn) ensureAudio();
  else bgm.pause();
}

/* 浏览器规定必须等用户先动手，才许出声——任意一次点击/触摸就把乐起了 */
document.addEventListener("pointerdown", ensureAudio);
document.addEventListener("touchend", ensureAudio);
document.addEventListener("click", ensureAudio);

/* ═══════════ 生日扉页：首次登门才展示，之后直入签筒（?card=1 可再看） ═══════════ */

(function initCard() {
  const seen = localStorage.getItem("qyq_card_seen");
  const force = new URLSearchParams(location.search).has("card");
  if (seen && !force) document.getElementById("birthdayCard").classList.add("gone");
})();

function openCard() {
  localStorage.setItem("qyq_card_seen", "1");
  document.getElementById("birthdayCard").classList.add("gone");
  ensureAudio();   /* 启签这一下正是手势，乐声随扉页揭开同时浮起 */
}

renderStart();
</script>
